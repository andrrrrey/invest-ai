version: "3.9"

services:
  backend:
    build: ./backend
    container_name: invest_backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////data/invest_ai.db
    volumes:
      - db_data:/data
      - ./frontend:/app/../frontend:ro   # serve static files
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:1.25-alpine
    container_name: invest_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend

volumes:
  db_data:
  nginx_logs:
