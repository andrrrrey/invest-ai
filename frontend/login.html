<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Инвестиционный процессор</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: #E5E5E5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 28px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: #5E5CE6;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .logo-text h2 {
            font-size: 16px;
            font-weight: 700;
            color: #1C1C1E;
        }

        .logo-text p {
            font-size: 12px;
            color: #8E8E93;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            color: #1C1C1E;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: #8E8E93;
            margin-bottom: 32px;
        }

        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1C1C1E;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #E5E5E5;
            border-radius: 14px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
            color: #1C1C1E;
        }

        input:focus {
            border-color: #5E5CE6;
            box-shadow: 0 0 0 3px rgba(94, 92, 230, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: #5E5CE6;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .error-msg {
            background: #FFE5E5;
            color: #FF3B30;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 16px;
            display: none;
        }

        .error-msg.visible { display: block; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
            <div class="logo-text">
                <h2>Инвестиционный процессор</h2>
                <p>Платформа управления проектами</p>
            </div>
        </div>

        <h1>Добро пожаловать</h1>
        <p class="subtitle">Введите данные для входа в систему</p>

        <form id="loginForm">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="your@email.com" required autocomplete="email">
            </div>
            <div class="field">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login" id="submitBtn">
                <i class="fas fa-sign-in-alt"></i>
                <span id="btnText">Войти</span>
            </button>

            <div class="error-msg" id="errorMsg"></div>
        </form>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        // Already logged in → redirect
        if (isLoggedIn()) {
            window.location.href = '/';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const errorMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            btnText.textContent = 'Вхожу...';
            errorMsg.classList.remove('visible');

            try {
                const formData = new URLSearchParams();
                formData.append('username', email);
                formData.append('password', password);

                const res = await fetch('/api/v1/auth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString(),
                });

                if (res.ok) {
                    const data = await res.json();
                    saveAuth(data);
                    window.location.href = '/';
                } else {
                    const err = await res.json();
                    errorMsg.textContent = err.detail || 'Неверный email или пароль';
                    errorMsg.classList.add('visible');
                }
            } catch (err) {
                errorMsg.textContent = 'Ошибка соединения с сервером';
                errorMsg.classList.add('visible');
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Войти';
            }
        });
    </script>
</body>
</html>
