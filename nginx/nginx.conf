# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name invest.futuguru.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name invest.futuguru.com;

    ssl_certificate     /etc/letsencrypt/live/invest.futuguru.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/invest.futuguru.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;

    # Static frontend files
    root /usr/share/nginx/html;
    index main.html;

    # API proxy → FastAPI backend
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Avatar uploads served by FastAPI
    location /avatars/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_valid  200 1d;
    }

    # SPA fallback — serve index for unknown routes
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
}
